rules:
  - id: "RULE-001"
    name: "SQL Injection - Basic"
    pattern: "(?i)(union\\s+select|select\\s+.*\\s+from|insert\\s+into|delete\\s+from|drop\\s+table|update\\s+.*\\s+set)"
    target: "all"
    severity: "high"
    action: "block"
  - id: "RULE-002"
    name: "SQL Injection - Comment"
    pattern: "(?i)(--|/\\*|\\*/|#.*$)"
    target: "all"
    severity: "medium"
    action: "log"
  - id: "RULE-003"
    name: "XSS - Script Tag"
    pattern: "(?i)(<script[^>]*>|</script>|javascript:|on\\w+\\s*=)"
    target: "all"
    severity: "high"
    action: "block"
  - id: "RULE-004"
    name: "XSS - Event Handler"
    pattern: "(?i)(onerror|onload|onmouseover|onfocus|onblur)\\s*="
    target: "all"
    severity: "high"
    action: "block"
  - id: "RULE-005"
    name: "Path Traversal"
    pattern: "(\\.\\./|\\.\\.\\\\|%2e%2e%2f|%2e%2e/|\\.\\.%2f)"
    target: "url"
    severity: "high"
    action: "block"
  - id: "RULE-006"
    name: "Command Injection"
    pattern: "(?i)(;\\s*(ls|cat|rm|wget|curl|bash|sh|python|perl|nc|netcat)\\b|\\|\\s*(ls|cat|rm|wget|curl))"
    target: "all"
    severity: "critical"
    action: "block"
  - id: "RULE-007"
    name: "LDAP Injection"
    pattern: "(?i)(\\(\\|\\(|\\)\\(|\\(\\&\\(|%28%7c%28)"
    target: "all"
    severity: "high"
    action: "block"
  - id: "RULE-008"
    name: "Remote File Inclusion"
    pattern: "(?i)(https?://|ftp://|php://|data://|expect://)"
    target: "url"
    severity: "high"
    action: "block"
